 {% extends 'design/base.html' %}
{% load static %}
<!-- {% load crispy_forms_tags %} -->

{% block 'header' %}
{% endblock %}


{% block 'body' %}
<div class="text-center">
    <main class="form-signin">

        <form id="loginForm" method="POST">
            {% csrf_token %}
            <img class="mb-4" src="{% static 'logo.png' %}" alt="" width="72" height="72">

            <input type="text" id="username" name="username" class="form-control" placeholder="Username" required> 
            <input type="password" id="password" name="password" class="form-control mt-2" placeholder="Password" required>

            <button class="w-100 btn btn-lg btn-danger mt-3" type="submit">
                Login
            </button>

            <p class="mt-5 mb-3 text-muted">Copyright © 2022 AutoMax</p>
        </form>

        <p id="errorMsg" style="color:red;"></p>

    </main>
</div> 

{% endblock %}
