{% extends "design/base.html" %}


{% block 'body' %}

<h2>Book Test Drive for {{ listing.model }}</h2>

<div class="container my-5" style="max-width: 650px;">

    <div class="card shadow-lg border-0 rounded-4 p-4">

        <div class="text-center">
            <h2 class="fw-bold mb-1">Book a Test Drive</h2>
            <p class="text-muted">Experience the car before making a decision</p>
        </div>

        <div class="bg-light p-3 rounded-3 my-3">
            <h5 class="mb-2">
                <i class="bi bi-car-front-fill text-primary"></i> 
                {{ listing.model }} 
            </h5>
            <p class="mb-1"><strong>Car Title:</strong> {{ listing.title }}</p>
            <p class="mb-0"><strong>Seller:</strong> {{ listing.seller.username }}</p>
        </div>

        <form action="" method="POST" class="mt-3">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">📅 Select Date</label>
                <input type="date" class="form-control form-control-lg rounded-3" name="date" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">⏰ Select Time</label>
                <input type="time" class="form-control form-control-lg rounded-3" name="time" required>
            </div>

            <button class="btn btn-primary w-100 py-2 mt-2 rounded-3 fw-semibold">
                ✔ Confirm Test Drive
            </button>
        </form>

    </div>

</div>
{% endblock %}
